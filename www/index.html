<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KAZAKHSTAN RP</title>
    <script src="12=88.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Arial', sans-serif; 
        }

        /* Background Animation */
        @keyframes zoomIn {
            from { transform: scale(1.2); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; z-index: -1;
            animation: zoomIn 1.5s ease-out forwards;
        }

        /* Сол жақ үстіңгі панель */
        .top-left {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 40px;
            animation: slideDown 0.8s ease-out 0.5s both;
        }
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .label { color: #00bfff; font-size: 14px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 280px; padding: 15px; background: rgba(0,0,0,0.8); 
            border: 2px solid #333; border-radius: 8px; color: #fff; font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        input:focus { border-color: #00bfff; }

        /* Оң жақ астыңғы панель */
        .bottom-right {
            position: absolute; bottom: 40px; right: 60px;
            animation: slideUp 0.8s ease-out 0.8s both;
        }
        @keyframes slideUp {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        button { 
            padding: 18px 70px; background: #28a745; color: #fff;
            font-weight: 900; border: none; border-radius: 5px;
            cursor: pointer; font-size: 22px; text-transform: uppercase;
            box-shadow: 0 8px 0 #1e7e34; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #1e7e34; }

        #error { color: #ff4d4d; font-size: 12px; margin-top: 5px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <div class="top-left">
        <div class="label">Ойыншы никнеймі</div>
        <input type="text" id="nickname" placeholder="Nickname_Server" maxlength="16">
        <div id="error">ҚАТЕ ФОРМАТ!</div>
    </div>

    <div class="bottom-right">
        <button onclick="go()">БАСТАУ</button>
    </div>

    <script>
        window.onload = () => {
            if (typeof KRP_CORE !== 'undefined' && KRP_CORE.ASSETS.BG_MAIN) {
                document.getElementById('bg').style.backgroundImage = "url('" + KRP_CORE.ASSETS.BG_MAIN + "')";
            }
        };

        function go() {
            const n = document.getElementById('nickname').value;
            const e = document.getElementById('error');
            if (/^[a-zA-Z0-9_]+$/.test(n) && n.length > 3) {
                e.style.display = "none";
                alert("КІРУ: " + n);
            } else {
                e.style.display = "block";
            }
        }
    </script>
</body>
</html>
