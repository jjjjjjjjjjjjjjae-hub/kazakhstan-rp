<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: sans-serif; background: #001a33; 
        }
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('bg.png'); 
            background-size: cover; background-position: center; z-index: -1; 
        }
        .login-section { 
            position: absolute; left: 5%; top: 50%; transform: translateY(-50%); 
            padding: 10px 20px; border-left: 4px solid #00c3ff; 
            background: rgba(0, 0, 0, 0.6); border-radius: 0 15px 15px 0; 
        }
        .login-section h2 { margin: 0 0 10px 0; font-size: 22px; color: #00c3ff; text-transform: uppercase; }
        input { width: 200px; padding: 12px; background: rgba(30, 30, 30, 0.9); border: none; color: white; border-radius: 10px; outline: none; }
        .start-section { position: absolute; right: 5%; bottom: 10%; }
        .btn-play { 
            background: #238636; color: white; border: none; 
            padding: 15px 50px; font-size: 20px; font-weight: bold; 
            border-radius: 40px; cursor: pointer; text-transform: uppercase; 
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="login-section">
        <h2>ОЙЫНШЫ</h2>
        <input type="text" id="playerNick" placeholder="Никнейм...">
    </div>
    <div class="start-section">
        <button class="btn-play" onclick="startGame()">БАСТАУ</button>
    </div>

    <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
    <script>
        // ЭКРАНДЫ ЖАТҚЫЗУ ФУНКЦИЯСЫ (ҚАЙТА ҚОСЫЛДЫ)
        async function setupGame() {
            try {
                if (window.Capacitor && window.Capacitor.Plugins.ScreenOrientation) {
                    await window.Capacitor.Plugins.ScreenOrientation.lock({ orientation: 'landscape' });
                }
            } catch (e) {
                console.log("Orientation lock only works on devices");
            }
            
            // Суретті жүктеуді тексеру (күштеп жаңарту)
            document.getElementById('bg').style.backgroundImage = "url('bg.png?v=" + new Date().getTime() + "')";
        }

        window.onload = setupGame;

        function startGame() {
            const nick = document.getElementById('playerNick').value;
            if(nick.length > 2) alert("Қош келдіңіз, " + nick + "!");
            else alert("Никнейм жазыңыз!");
        }
    </script>
</body>
</html>
