<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KAZAKHSTAN RP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('фото.png') no-repeat center center;
            background-size: cover; z-index: -1; 
        }

        #canvas-3d { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .interface {
            position: absolute; width: 100%; height: 100%; z-index: 10;
        }

        .auth-box {
            position: absolute; top: 40px; left: 50px;
        }

        .label { 
            color: #00bfff; font-size: 14px; font-weight: 900; 
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 10px; border-left: 4px solid #00bfff; padding-left: 10px;
        }

        input { 
            width: 320px; padding: 18px; background: rgba(0,0,0,0.8); 
            border: 1px solid #1a1a1a; color: #fff; font-size: 16px;
        }

        .btn-box {
            position: absolute; bottom: 50px; right: 70px;
        }

        .play-btn { 
            padding: 22px 100px; background: #1db954; color: #fff; 
            font-weight: 900; border: none; cursor: pointer; font-size: 26px; 
            text-transform: uppercase; letter-spacing: 5px;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0% 100%);
            box-shadow: 0 0 30px rgba(29, 185, 84, 0.4);
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="canvas-3d"></div>

    <div class="interface">
        <div class="auth-box">
            <div class="label">Авторизация</div>
            <input type="text" id="nick" placeholder="NICKNAME_SERVER">
        </div>

        <div class="btn-box">
            <button class="play-btn" onclick="go()">Бастау</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, model;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-3d').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xffffff, 1);
            sunLight.position.set(5, 5, 5);
            scene.add(sunLight);

            const loader = new THREE.GLTFLoader();
            loader.load('текстура.glb', function(gltf) {
                model = gltf.scene;
                // Модельдің өлшемін және орнын баптау
                model.scale.set(1.5, 1.5, 1.5);
                model.position.set(0, -1, -5);
                scene.add(model);
                animate();
            });

            camera.position.z = 5;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(model) model.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        function go() {
            const n = document.getElementById('nick').value;
            if(n.length > 3) alert("Қосылуда: " + n);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
