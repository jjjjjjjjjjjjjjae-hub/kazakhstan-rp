<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazakhstan RP</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('1.png') no-repeat center center; background-size: cover; z-index: -1; }
        .login { position: absolute; top: 50%; left: 8%; transform: translateY(-50%); color: #00bfff; }
        input { padding: 12px; border-radius: 8px; border: none; width: 250px; background: rgba(0,0,0,0.7); color: #fff; margin-top: 10px; border: 1px solid #333; }
        button { margin-top: 15px; padding: 12px 30px; border: none; border-radius: 25px; background: #28a745; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="login">
        <h2>ОЙЫНШЫ</h2>
        <input type="text" id="name" placeholder="Никнейм...">
        <br>
        <button onclick="alert('Сәлем, ' + document.getElementById('name').value)">БАСТАУ</button>
    </div>
</body>
</html>
