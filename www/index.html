<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KAZAKHSTAN RP</title>
    <script src="12=88.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; 
        }

        /* Background */
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; z-index: -1;
            filter: brightness(0.8);
        }

        /* Сол жақ үстіңгі панель */
        .top-left {
            position: absolute; top: 40px; left: 50px;
            animation: slideInLeft 0.8s ease-out;
        }
        @keyframes slideInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .ui-label { 
            color: #00bfff; font-size: 12px; font-weight: 800; 
            letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase;
            display: flex; align-items: center;
        }
        .ui-label::before {
            content: ''; display: inline-block; width: 4px; height: 15px; 
            background: #00bfff; margin-right: 10px;
        }
        input { 
            width: 320px; padding: 18px; background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(0, 191, 255, 0.3); border-radius: 2px;
            color: #fff; font-size: 16px; backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        input:focus { border-color: #00bfff; box-shadow: 0 0 15px rgba(0, 191, 255, 0.2); }

        /* Оң жақ астыңғы "БАСТАУ" батырмасы - ЖАҢА ДИЗАЙН */
        .bottom-right {
            position: absolute; bottom: 50px; right: 60px;
            animation: slideInRight 1s ease-out 0.5s both;
        }
        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .btn-container { position: relative; display: inline-block; }
        
        .play-btn { 
            position: relative;
            padding: 22px 80px; 
            background: linear-gradient(90deg, #1db954, #19a34a);
            color: #fff; font-weight: 900; border: none; 
            cursor: pointer; font-size: 24px; text-transform: uppercase;
            letter-spacing: 4px; overflow: hidden;
            transition: 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            box-shadow: 0 0 25px rgba(29, 185, 84, 0.4);
        }

        .play-btn::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .play-btn:hover::after { left: 100%; }
        
        .play-btn:active { 
            transform: scale(0.92); 
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.6);
        }

        .btn-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1db954; filter: blur(30px); opacity: 0.3;
            z-index: -1;
        }

        #error { color: #ff3e3e; font-size: 11px; font-weight: bold; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <div class="top-left">
        <div class="ui-label">Авторизация</div>
        <input type="text" id="nickname" placeholder="NICKNAME_SERVER" maxlength="16">
        <div id="error">ҚАТЕ ФОРМАТ!</div>
    </div>

    <div class="bottom-right">
        <div class="btn-container">
            <div class="btn-glow"></div>
            <button class="play-btn" onclick="connect()">Бастау</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            if (typeof KRP_CORE !== 'undefined' && KRP_CORE.ASSETS.BG_MAIN) {
                document.getElementById('bg').style.backgroundImage = "url('" + KRP_CORE.ASSETS.BG_MAIN + "')";
            }
        };

        function connect() {
            const n = document.getElementById('nickname').value;
            const e = document.getElementById('error');
            if (/^[a-zA-Z0-9_]+$/.test(n) && n.length > 3) {
                e.style.display = "none";
                alert("ЖҮЙЕГЕ ҚОСЫЛУДА: " + n);
            } else {
                e.style.display = "block";
            }
        }
    </script>
</body>
</html>
