<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%), url('background.png');
            background-size: contain; /* Карта толық көрінуі үшін */
            background-repeat: no-repeat;
            background-position: center;
            z-index: -1;
        }
        .login-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh;
        }
        .container {
            background: rgba(13, 17, 23, 0.9); padding: 30px;
            border-radius: 15px; border: 1px solid #30363d;
            width: 300px; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: white;
        }
        h1 { margin: 0 0 10px; font-size: 24px; color: #58a6ff; }
        input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #0d1117; border: 1px solid #30363d; color: white;
            border-radius: 6px; box-sizing: border-box;
        }
        .btn-start {
            width: 100%; padding: 12px; background: #238636;
            border: none; color: white; font-weight: bold;
            border-radius: 6px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="login-box" id="loginScreen">
        <div class="container">
            <h1>KAZAKHSTAN <span style="color:white">RP</span></h1>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Құпия сөз">
            <button class="btn-start" onclick="enterGame()">ОЙЫНҒА КІРУ</button>
        </div>
    </div>
    <script>
        function enterGame() {
            const nick = document.getElementById('nick').value;
            if(nick.length > 2) {
                document.getElementById('loginScreen').style.display = 'none';
                alert("Қош келдіңіз, " + nick + "!");
            }
        }
        window.onload = function() {
            if (window.Capacitor && window.Capacitor.Plugins.ScreenOrientation) {
                window.Capacitor.Plugins.ScreenOrientation.lock({ orientation: 'landscape' });
            }
        };
    </script>
</body>
</html>
