<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #000;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
        
        /* СОЛ ЖАҚТАҒЫ НИКНЕЙМ ТАҚТАСЫ */
        .login-section {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #00c3ff;
            width: 250px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .login-section h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #00c3ff;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        /* ОҢ ЖАҚ АСТЫНДАҒЫ БАСТАУ БАТЫРМАСЫ */
        .start-section {
            position: absolute;
            right: 40px;
            bottom: 40px;
        }
        .btn-play {
            background: #238636;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(35, 134, 54, 0.4);
            transition: 0.2s;
        }
        .btn-play:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="login-section" id="ui-login">
        <h2>Ойыншы</h2>
        <input type="text" id="playerNick" placeholder="Никнейм жазыңыз...">
    </div>

    <div class="start-section">
        <button class="btn-play" onclick="startGame()">Бастау</button>
    </div>

    <script>
        function startGame() {
            const nick = document.getElementById('playerNick').value;
            if(nick.length > 2) {
                alert("Қош келдіңіз, " + nick + "! Серверге қосылуда...");
                // Осы жерде интерфейсті жасырып, ойынды бастауға болады
            } else {
                alert("Алдымен никнейм жазыңыз!");
            }
        }

        window.onload = function() {
            if (window.Capacitor && window.Capacitor.Plugins.ScreenOrientation) {
                window.Capacitor.Plugins.ScreenOrientation.lock({ orientation: 'landscape' });
            }
        };
    </script>
</body>
</html>
