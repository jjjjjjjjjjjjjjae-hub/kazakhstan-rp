<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <script src="12=88.js"></script>
    <style>
        * { box-sizing: border-box; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; 
        }

        /* ЕРЕЖЕ 1: Әрқашан жатық қалып (Landscape) */
        @media screen and (orientation: portrait) {
            #portrait-lock { display: flex !important; }
        }

        #portrait-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00bfff; z-index: 10000;
            justify-content: center; align-items: center; text-align: center;
        }

        /* ЕРЕЖЕ 3: Анимациялар */
        @keyframes bgAppear {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        @keyframes panelSlide {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(-50%); opacity: 1; }
        }

        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; z-index: -1;
            animation: bgAppear 1.5s ease-out forwards;
        }

        .login-panel {
            position: absolute; top: 50%; left: 8%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.85); padding: 35px;
            border-radius: 4px; border-bottom: 4px solid #00bfff;
            width: 340px;
            animation: panelSlide 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) 0.5s both;
        }

        h2 { color: #fff; margin: 0; font-size: 22px; letter-spacing: 1px; }
        .version { color: #00bfff; font-size: 10px; margin-bottom: 25px; opacity: 0.7; }

        input { 
            width: 100%; padding: 14px; background: #0a0a0a; border: 1px solid #222;
            color: #fff; margin-bottom: 10px; font-size: 15px;
        }

        button { 
            width: 100%; padding: 14px; background: #28a745; color: #fff;
            font-weight: bold; border: none; cursor: pointer;
            font-size: 15px; text-transform: uppercase;
            box-shadow: 0 4px 0 #1e7e34;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e7e34; }

        #error { color: #ff4d4d; font-size: 11px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div id="portrait-lock">
        <div>
            <h1 style="font-size: 40px;">🔄</h1>
            <h2>ЭКРАНДЫ БҰРЫҢЫЗ</h2>
            <p style="font-size: 14px;">Ойын тек Landscape режимінде жұмыс істейді</p>
        </div>
    </div>

    <div id="bg"></div>

    <div class="login-panel">
        <h2>KAZAKHSTAN RP</h2>
        <div class="version">PROJECT VERSION: 1.2.0 (STABLE)</div>
        
        <input type="text" id="nickname" placeholder="Nickname_Server" maxlength="20">
        <div id="error">Қате формат!</div>
        
        <button onclick="startSession()">БАСТАУ</button>
    </div>

    <script>
        window.onload = () => {
            if (typeof KRP_CORE !== 'undefined') {
                document.getElementById('bg').style.backgroundImage = "url('" + KRP_CORE.ASSETS.BG_MAIN + "')";
            }
        };

        function startSession() {
            const nick = document.getElementById('nickname').value;
            const error = document.getElementById('error');
            
            // ЕРЕЖЕ 2: Қатаң никнейм тексеру
            const pattern = /^[a-zA-Z0-9_]+$/;
            
            if (!pattern.test(nick) || nick.includes(" ")) {
                error.innerText = "ҚАТЕ: Тек әріп, сан және _ қолданыңыз!";
                error.style.display = "block";
            } else if (nick.length < 4) {
                error.innerText = "ҚАТЕ: Ник өте қысқа!";
                error.style.display = "block";
            } else {
                error.style.display = "none";
                alert("INITIALIZING SESSION: " + nick);
            }
        }
    </script>
</body>
</html>
