<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #001a33; /* Сурет шықпаса, қара емес, көкшіл болады */
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.png'); /* ЖАҢА АТЫ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        .login-section {
            position: absolute; left: 5%; top: 50%;
            transform: translateY(-50%); padding: 10px 20px;
            border-left: 4px solid #00c3ff;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 0 15px 15px 0;
        }
        .login-section h2 { margin: 0 0 10px 0; font-size: 22px; color: #00c3ff; text-transform: uppercase; }
        input { width: 250px; padding: 15px; background: rgba(30, 30, 30, 0.9); border: none; color: white; border-radius: 10px; font-size: 16px; outline: none; }
        .start-section { position: absolute; right: 5%; bottom: 10%; }
        .btn-play { background: #238636; color: white; border: none; padding: 18px 60px; font-size: 24px; font-weight: 900; border-radius: 40px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px rgba(35, 134, 54, 0.5); }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="login-section">
        <h2>ОЙЫНШЫ</h2>
        <input type="text" id="playerNick" placeholder="Никнейм жазыңыз...">
    </div>
    <div class="start-section">
        <button class="btn-play" onclick="startGame()">БАСТАУ</button>
    </div>
    <script>
        function startGame() {
            const nick = document.getElementById('playerNick').value;
            if(nick.length > 2) alert("Қош келдіңіз, " + nick + "!");
            else alert("Никнейм жазыңыз!");
        }
    </script>
</body>
</html>
