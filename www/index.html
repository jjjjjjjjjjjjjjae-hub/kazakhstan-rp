<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <!-- БАЗАНЫ ЖҮКТЕУ -->
    <script src="12=88.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; font-family: sans-serif; 
        }
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; z-index: -1;
            transition: opacity 1s ease-in-out;
        }
        .ui { 
            position: absolute; top: 50%; left: 8%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.7); padding: 30px; border-radius: 15px;
            border-left: 4px solid #00bfff;
        }
        h2 { color: #00bfff; margin: 0 0 10px 0; text-transform: uppercase; }
        input { 
            padding: 12px; border-radius: 8px; border: 1px solid #333; 
            width: 260px; background: #111; color: #fff; outline: none;
        }
        button { 
            margin-top: 15px; padding: 12px 35px; border: none; border-radius: 20px; 
            background: #28a745; color: white; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="ui">
        <h2 id="status">ЖҮКТЕЛУДЕ...</h2>
        <input type="text" id="nick" placeholder="Никнейм...">
        <br>
        <button onclick="play()">БАСТАУ</button>
    </div>

    <script>
        // БАЗАДАН СУРЕТТІ ШЫҒАРУ
        window.onload = function() {
            setTimeout(() => {
                if (typeof ASSETS_DB !== 'undefined') {
                    const bg = document.getElementById('bg');
                    bg.style.backgroundImage = "url('" + ASSETS_DB.MAIN_BG + "')";
                    document.getElementById('status').innerText = "ОЙЫНШЫ";
                    console.log("Assets loaded from 12=88 database");
                } else {
                    document.getElementById('status').innerText = "ҚАТЕ: БАЗА ЖОҚ";
                }
            }, 500);
        };

        function play() {
            const n = document.getElementById('nick').value;
            if(n.length > 2) alert('Қош келдіңіз, ' + n + '!');
            else alert('Ник жазыңыз!');
        }
    </script>
</body>
</html>
