<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZAKHSTAN RP</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: sans-serif; background: #000; 
        }
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('1.png') no-repeat center center; 
            background-size: cover; z-index: -1;
        }
        .login-section { 
            position: absolute; left: 5%; top: 50%; transform: translateY(-50%); 
            padding: 10px 20px; border-left: 4px solid #00c3ff; 
            background: rgba(0, 0, 0, 0.7); border-radius: 0 15px 15px 0; 
        }
        .login-section h2 { margin: 0 0 10px 0; font-size: 22px; color: #00c3ff; text-transform: uppercase; }
        input { width: 220px; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        .start-section { position: absolute; right: 5%; bottom: 10%; }
        .btn-play { 
            background: #238636; color: white; border: none; 
            padding: 15px 50px; font-size: 20px; font-weight: bold; 
            border-radius: 40px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="login-section">
        <h2>ОЙЫНШЫ</h2>
        <input type="text" id="playerNick" placeholder="Никнейм жазыңыз...">
    </div>
    <div class="start-section">
        <button class="btn-play" onclick="startGame()">БАСТАУ</button>
    </div>
    <script>
        window.onload = function() {
            if (window.Capacitor && window.Capacitor.Plugins.ScreenOrientation) {
                window.Capacitor.Plugins.ScreenOrientation.lock({ orientation: 'landscape' });
            }
        };
        function startGame() {
            const nick = document.getElementById('playerNick').value;
            if(nick.length > 2) alert("Қош келдіңіз, " + nick + "!");
        }
    </script>
</body>
</html>
